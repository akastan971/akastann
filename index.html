    o.connect(g);g.connect(audioCtx.destination);
    o.type="sine";o.frequency.setValueAtTime(880,audioCtx.currentTime);
    g.gain.setValueAtTime(0.25,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
    o.start();o.stop(audioCtx.currentTime+0.5);
    var o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.connect(g2);g2.connect(audioCtx.destination);
    o2.type="sine";o2.frequency.setValueAtTime(1320,audioCtx.currentTime+0.15);
    g2.gain.setValueAtTime(0.2,audioCtx.currentTime+0.15);
    g2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);
    o2.start(audioCtx.currentTime+0.15);o2.stop(audioCtx.currentTime+0.6);
  }catch(e){}
}

// Estime la consommation sur TOUTES les commandes depuis le dernier reset stock
function computeConsoAll(){
  var c={pilons:0,cuisses:0,accras:0,frites:0,riz:0,coca:0,cocaz:0,crist:0,loc:0};
  var resetAt=globalStock._resetAt||0;
  Object.values(fbO).forEach(function(o){
    if(!o.ts||o.ts<resetAt)return;
    (o.items||[]).forEach(function(it){
      if(it.tp==="m"){
        var qte=(it.name.indexOf("Vieux")>-1?3:it.name.indexOf("Sainte")>-1?6:9);
        if(it.vi==="Pilons")c.pilons+=qte; else c.cuisses+=(it.name.indexOf("Vieux")>-1?1:it.name.indexOf("Sainte")>-1?2:3);
        if(it.mt==="Mixte"){c.frites+=0.12;c.riz+=0.12;}
        else{if(it.ac.indexOf("Frites")>-1)c.frites+=0.25;if(it.ac.indexOf("Riz")>-1)c.riz+=0.25;}
        if(it.bo&&c[it.bo]!==undefined)c[it.bo]+=1;
      }else if(it.tp==="s"){
        it.items.forEach(function(s){
          if(s.id==="frit")c.frites+=s.qty*0.2;
          if(s.id==="accr")c.accras+=s.qty*5;
          if(c[s.id]!==undefined)c[s.id]+=s.qty;
        });
      }
    });
  });
  return c;
}

  return html;
}

// ─── RENDER ADMIN
var aSection="cuisine"; // cuisine | stats | stock | dep
function rA(){
  var el=document.getElementById("V2");
  if(!aLog){
    el.innerHTML='<div class="apage"><div class="lbox"><div class="lico">🔐</div><div class="ltitle">Accès Admin</div><div class="lsub">A KA STANN & DEDETTE</div><input class="linp" type="password" placeholder="Mot de passe" oninput="gAP(this.value)" />'+(aErr?'<div class="lerr">Mot de passe incorrect</div>':"")+'<button class="lbtn" onclick="gAL()">Connexion</button></div></div>';
    return;
  }
  var tabsBar='<div class="adminmaintabs">'
    +'<div class="adminmaintab'+(aSection==="cuisine"?" on":"")+'" onclick="gASec(\'cuisine\')">🍳 Cuisine</div>'
    +'<div class="adminmaintab'+(aSection==="stats"?" on":"")+'" onclick="gASec(\'stats\')">📊 Stats</div>'
    +'<div class="adminmaintab'+(aSection==="stock"?" on":"")+'" onclick="gASec(\'stock\')">📦 Stock</div>'
    +'<div class="adminmaintab'+(aSection==="dep"?" on":"")+'" onclick="gASec(\'dep\')">💰 D\u00E9p.</div>'
    +'<div class="logoutbtn" style="display:flex;align-items:center;margin:6px 8px;flex-shrink:0" onclick="gALO()">Déco</div>'
    +'</div>';
  var body=aSection==="cuisine"?buildCuisineFull():buildAdminDash();
  el.innerHTML=tabsBar+body;
}

function buildAdminDash(){
  var all=Object.values(fbO);
  var dm={};
  all.forEach(function(o){if(!o.ts)return;var d=ts2d(o.ts);if(!dm[d])dm[d]=[];dm[d].push(o);});
  var dates=Object.keys(dm).sort(function(a,b){return b.localeCompare(a);});
  var todayStr=ts2d(Date.now());
  if(!dates.includes(todayStr))dates.unshift(todayStr);
  if(!aDt)aDt=todayStr;

  var dt='<div class="dtabs">';
  dates.forEach(function(d){dt+='<div class="dtab'+(aDt===d?" on":"")+'" onclick="gAD(\''+d+'\')">'+dfr(d)+(d===todayStr?" (aujourd'hui)":"")+'</div>';});
  dt+='</div>';
  var dayCount=(dm[aDt]||[]).length;
  var delDayBtn=dayCount>0?'<div style="padding:0 16px 10px;background:#0a0a0a"><button class="resetbtn" style="width:100%;padding:8px 0" onclick="gCLRDay(\''+aDt+'\')">🗑️ Supprimer les '+dayCount+' commande(s) du '+dfr(aDt)+'</button></div>':"";

  var day=dm[aDt]||[];
  var ca=0,nbm=0,mc={},scc={};
  day.forEach(function(o){
    ca+=parseFloat(o.total)||0;
    (o.items||[]).forEach(function(it){
      if(it.tp==="m"){nbm++;mc[it.name]=(mc[it.name]||0)+1;}
      else if(it.tp==="s"){it.items.forEach(function(s){if(!scc[s.name])scc[s.name]={qty:0,ca:0};scc[s.name].qty+=s.qty;scc[s.name].ca+=s.qty*(parseFloat(s.up)||0);});}
    });
  });

  var body="";

  if(aSection==="stats"){
    if(!day.length){body='<div class="nodata">Aucune commande ce jour</div>';}
    else{
      var mr=Object.entries(mc).sort(function(a,b){return b[1]-a[1];});
      var maxm=mr.length?mr[0][1]:1;
      var mrows=mr.map(function(e,i){var pct=Math.round(e[1]/maxm*100);var am=MS.concat(MM).find(function(m){return m.name===e[0];});var mca=e[1]*(am?parseFloat(am.price):0);return'<div class="rrow"><div class="rl"><span class="rn">'+(i+1)+'</span><div><div class="rname">'+e[0]+'</div><div class="bwrap"><div class="bfill" style="width:'+pct+'%"></div></div></div></div><div class="rright"><span class="rqty">x'+e[1]+'</span><span class="rca">'+fp(mca)+'€</span></div></div>';}).join("");
      var sr=Object.entries(scc).sort(function(a,b){return b[1].qty-a[1].qty;});
      var maxs=sr.length?sr[0][1].qty:1;
      var srows=sr.map(function(e,i){var pct=Math.round(e[1].qty/maxs*100);return'<div class="rrow"><div class="rl"><span class="rn">'+(i+1)+'</span><div><div class="rname">'+e[0]+'</div><div class="bwrap"><div class="bfill" style="width:'+pct+'%"></div></div></div></div><div class="rright"><span class="rqty">x'+e[1].qty+'</span><span class="rca">'+fp(e[1].ca)+'€</span></div></div>';}).join("");
      body='<div class="sgrid2"><div class="scard2 hl"><div class="sval">'+fp(ca)+'€</div><div class="slbl">Chiffre affaires</div></div><div class="scard2"><div class="sval">'+day.length+'</div><div class="slbl">Commandes</div></div><div class="scard2"><div class="sval">'+nbm+'</div><div class="slbl">Menus vendus</div></div><div class="scard2"><div class="sval">'+fp(day.length?ca/day.length:0)+'€</div><div class="slbl">Panier moyen</div></div></div>'+(mrows?'<div class="asec">Menus les plus vendus</div>'+mrows:"")+(srows?'<div class="asec">Suppléments les plus vendus</div>'+srows:"");
    }
  }

  if(aSection==="stock"){
    var conso=computeConsoAll();
    var lowCount=0;
    var resetDate=globalStock._resetAt?new Date(globalStock._resetAt).toLocaleDateString("fr-FR"):"jamais";
    var rows=stockDef.map(function(s){
      var startVal=globalStock[s.id];
      var hasStart=startVal!==undefined&&startVal!=="";
      var used=conso[s.id]||0;
      var remain=hasStart?(parseFloat(startVal)-used):null;
      var isLow=hasStart&&remain!==null&&remain<=parseFloat(startVal)*0.15;
      if(isLow)lowCount++;
      var remainBoxClass=!hasStart?"empty":(isLow?"low":"");
      var remainValTxt=hasStart?(remain<0?"0":fp(remain)):"—";
      var soldTxt=hasStart?fp(used)+" "+s.unit+" vendus depuis le "+resetDate:"Non renseign\u00E9";
      return'<div class="stockrow'+(isLow?" low":"")+'">'
        +'<div style="flex:1"><div class="stockname">'+s.name+'</div><div class="stockleft'+(isLow?" lowt":"")+'">'+soldTxt+'</div>'
        +'<div style="display:flex;align-items:center;gap:6px;margin-top:6px"><input type="number" inputmode="decimal" step="0.1" class="stockinp" placeholder="Qt\u00E9" value="'+(hasStart?startVal:"")+'" onchange="gStockSet(\''+s.id+'\',this.value)" /><span style="font-size:11px;color:rgba(255,255,255,0.4)">'+s.unit+' en stock</span></div></div>'
        +'<div class="stockremain '+remainBoxClass+'"><div class="stockremainval '+remainBoxClass+'">'+remainValTxt+'</div><div class="stockremainunit">'+s.unit+' restant</div></div>'
        +'</div>';
    }).join("");
    body='<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:14px;line-height:1.6">Stock global — modifie les quantit\u00E9s apr\u00E8s chaque course. Le d\u00E9compte se fait sur toutes les commandes.</div>'
      +(lowCount>0?'<div style="background:rgba(255,80,80,0.1);border:1px solid #ff5555;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#ff5555;font-weight:600">\u26A0\uFE0F '+lowCount+' ingr\u00E9dient(s) en stock bas !</div>':"")
      +rows;
  }

  if(aSection==="dep"){
    var dep=stockInit[aDt+"_dep"]||"";
    var depVal=parseFloat(dep)||0;
    var net=ca-depVal;
    body='<div class="depbox"><span class="lbl">D\u00E9penses du jour (courses, achats...)</span>'
      +'<input type="number" inputmode="decimal" step="0.01" class="depinp" placeholder="Ex: 350" value="'+dep+'" onchange="gDepSet(this.value)" />'
      +'<div class="netgrid">'
      +'<div class="netcard"><div class="netval gold">'+fp(ca)+'€</div><div class="netlbl">CA brut</div></div>'
      +'<div class="netcard"><div class="netval red">-'+fp(depVal)+'€</div><div class="netlbl">D\u00E9penses</div></div>'
      +'<div class="netcard '+(net>=0?"pos":"neg")+'"><div class="netval '+(net>=0?"green":"red")+'">'+(net>=0?"+":"")+fp(net)+'€</div><div class="netlbl">B\u00E9n\u00E9fice net</div></div>'
      +'</div></div>';
  }

  var secLabels={stats:"📊 Stats",stock:"📦 Stock",dep:"💰 D\u00E9penses"};
  return'<div class="apage"><div class="ahdr"><div style="display:flex;align-items:center;gap:8px"><span>'+secLabels[aSection]+'</span></div><button class="resetbtn" onclick="gCLR()">🗑️ Tout reset</button></div>'+dt+delDayBtn+'<div class="abody">'+body+'</div></div>';
}

// ─── ACTIONS
window.gV=function(v){
  curV=v;
  [0,1,2].forEach(function(i){
    document.getElementById("V"+i).className=v===i?"":"hidden";
    document.getElementById("T"+i).className="ttab"+(v===i?" on":"");
  });
  if(v===2)initAudio();
  if(v===0)rCom();
  if(v===1)rC();
  if(v===2)rA();
};
setInterval(function(){if(curV===1)rC();},15000);
window.gS=function(s){sec=s;cfging=null;rCom();};
window.gSTcfg=function(id,t){cfging={id:id,t:t};cfg={nt:"",qty:1,sauces:[null],boissons:["coca"],viandes:["Pilons"],accomps:["Frites"]};saErr=false;rCom();};
window.gCC=function(){cfging=null;saErr=false;rCom();};
window.gC=function(k,v){cfg[k]=v;if(k==="sa")saErr=false;rCom();};
window.gN=function(v){cfg.nt=v;};
window.gQ=function(d){
  cfg.qty=Math.max(1,Math.min(20,cfg.qty+d));
  while(cfg.sauces.length<cfg.qty){cfg.sauces.push(null);cfg.boissons.push("coca");cfg.viandes.push("Pilons");cfg.accomps.push("Frites");}
  while(cfg.sauces.length>cfg.qty){cfg.sauces.pop();cfg.boissons.pop();cfg.viandes.pop();cfg.accomps.pop();}
  rCom();
};
window.gSA=function(idx,val){cfg.sauces[idx]=val;saErr=false;rCom();};
window.gBO=function(idx,val){cfg.boissons[idx]=val;rCom();};
window.gVI=function(idx,val){cfg.viandes[idx]=val;rCom();};
window.gACq=function(idx,val){cfg.accomps[idx]=val;rCom();};
window.gSI=function(id){sq[id]=(sq[id]||0)+1;rCom();};
window.gSD=function(id){if((sq[id]||0)>0)sq[id]--;rCom();};
window.gRM=function(i){pan.splice(i,1);rCom();};
window.gSND=function(){soundOn=!soundOn;if(soundOn)playDing();rC();};
window.gAM=function(){
  var missing=cfg.sauces.slice(0,cfg.qty).some(function(s){return !s;});
  if(missing){saErr=true;rCom();return;}
  var mx=cfging.t==="mixte",menus=mx?MM:MS;
  var m=menus.find(function(x){return x.id===cfging.id;});
  for(var i=0;i<cfg.qty;i++){
    var ac=mx?"Frites + Riz Madras":cfg.accomps[i];
    var pr=parseFloat(m.price)+(!mx&&ac==="Riz Madras (+2€)"?2:0);
    pan.push({tp:"m",name:m.name,mt:mx?"Mixte":"Simple",vi:cfg.viandes[i],ac:ac,bo:cfg.boissons[i],sa:cfg.sauces[i],nt:cfg.nt,price:pr});
  }
  cfging=null;cfg={nt:"",qty:1,sauces:[null],boissons:["coca"],viandes:["Pilons"],accomps:["Frites"]};saErr=false;rCom();
};
window.gAS=function(){
  var items=[];
  ALLSU.forEach(function(s){var q=sq[s.id]||0;if(q>0)items.push({id:s.id,name:s.name,qty:q,up:parseFloat(s.price)});});
  if(!items.length)return;
  var tot=items.reduce(function(a,s){return a+s.qty*s.up;},0);
  pan.push({tp:"s",items:items,price:tot});
  sq={};rCom();
};
window.gFIN=async function(){
  if(!pan.length||sending)return;
  sending=true;rCom();
  var ticket=Math.floor(Math.random()*900)+100;
  var order={ticket:ticket,items:pan,total:fp(pTot()),mode:"surplace",status:"en_attente",time:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),ts:Date.now()};
  await push(ref(db,"orders"),order);
  await sendWA(order);
  sending=false;tdone=ticket;
  pan=[];sq={};rCom();
};
window.gRST=function(){pan=[];sq={};cfging=null;tdone=null;tcrL=null;sending=false;sec="simple";cfg={vi:"Pilons",ac:"Frites",bo:"coca",nt:"",qty:1,sauces:[null]};cph="";phErr=false;saErr=false;rCom();};
window.gMR=function(k){update(ref(db,"orders/"+k),{status:"pret",readyAt:Date.now()});};
window.gPaid=function(k,val){update(ref(db,"orders/"+k),{paid:val});};
window.gAP=function(v){aPw=v;};
window.gAL=function(){if(aPw===PWD){aLog=true;aErr=false;aSection="cuisine";sessionStorage.setItem("adminLogged","1");rA();}else{aErr=true;rA();}};
window.gALO=function(){aLog=false;aPw="";aErr=false;aDt=null;aSection="cuisine";sessionStorage.removeItem("adminLogged");rA();};
window.gAD=function(d){aDt=d;rA();};
window.gASec=function(s){aSection=s;rA();};
window.gATab=function(t){aTab=t;rAD();};
window.gStockSet=function(id,val){
  var now=Date.now();
  globalStock[id]=val;
  globalStock[id+"_at"]=now;
  var patch={};
  patch[id]=val;
  patch[id+"_at"]=now;
  update(ref(db,"globalStock"),patch).then(function(){rA();});
};
window.gDepSet=function(val){
  stockInit[aDt+"_dep"]=val;
  update(ref(db,"stockData"),stockInit);
};
window.gCLR=function(){if(confirm("Supprimer TOUTES les commandes, toutes dates confondues ?")){remove(ref(db,"orders"));aDt=null;}};
window.gCLRDay=function(d){
  if(!confirm("Supprimer toutes les commandes du "+dfr(d)+" uniquement ?"))return;
  var toDelete=Object.entries(fbO).filter(function(e){return e[1].ts&&ts2d(e[1].ts)===d;});
  toDelete.forEach(function(e){remove(ref(db,"orders/"+e[0]));});
};

rCom();rC();rA();
</script>
